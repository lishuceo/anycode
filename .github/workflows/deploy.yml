name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /root/dev/anywhere-code
          clean: false

      - name: Install dependencies
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          cd /root/dev/anywhere-code
          npm ci

      - name: Build
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          cd /root/dev/anywhere-code
          npm run build

      - name: Restart service
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          cd /root/dev/anywhere-code
          npx pm2 restart ecosystem.config.cjs || npx pm2 start ecosystem.config.cjs
