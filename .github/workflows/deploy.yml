name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/pr-review.yml'
      - '.github/workflows/claude-comment.yml'
      - '.github/workflows/ci.yml'

jobs:
  deploy:
    runs-on: self-hosted
    concurrency:
      group: deploy-production
      cancel-in-progress: true
    steps:
      - name: Pull latest code
        run: |
          cd /root/dev/anywhere-code
          git fetch origin main
          git reset --hard origin/main

      - name: Install dependencies
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          cd /root/dev/anywhere-code
          npm ci

      - name: Build
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          cd /root/dev/anywhere-code
          npm run build

      - name: Wait for running queries to finish (direct push only)
        if: ${{ github.event.head_commit.committer.username != 'web-flow' }}
        run: |
          echo "Direct push to main detected, waiting 60s for running queries to finish..."
          sleep 60

      - name: Restart service
        run: |
          export NVM_DIR="$HOME/.nvm"
          . "$NVM_DIR/nvm.sh"
          pm2 restart anycode || pm2 start /root/dev/anywhere-code/ecosystem.config.cjs
